<!doctype html>
{% load static %}
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>{% block title %}Application Test Platform{% endblock %}</title>
        <link rel="stylesheet" href="{% static 'css/site.css' %}">
    </head>
    <body>
        <header class="site-header">
            <a class="brand" href="{% url 'applicants:index' %}">
                Application Test Platform
            </a>
            <nav class="site-nav">
                <a href="{% url 'applicants:index' %}">Apply</a>
                {% if request.user.is_authenticated %}
                    <a href="{% url 'administrative:dashboard' %}">Admin</a>
                {% endif %}
            </nav>
        </header>
        <main class="site-main">
            {% block content %}{% endblock %}
        </main>
        <footer class="site-footer">
            <small>&copy; {% now "Y" %} DATAJOB - a bit ahead</small>
        </footer>
    </body>
</html>
